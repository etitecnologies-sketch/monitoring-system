apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: websocket
  template:
    metadata:
      labels:
        app: websocket
    spec:
      containers:
      - name: websocket
        image: yourrepo/websocket-server:latest
        ports:
        - containerPort: 3001
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: websocket
  namespace: monitoring
spec:
  selector:
    app: websocket
  ports:
  - port: 3001
    targetPort: 3001
