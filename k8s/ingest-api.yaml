apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-api
  namespace: monitoring
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ingest-api
  template:
    metadata:
      labels:
        app: ingest-api
    spec:
      containers:
      - name: api
        image: yourrepo/ingest-api:latest
        ports:
        - containerPort: 3000
        - containerPort: 3002
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: database-url
        - name: WEBSOCKET_URL
          value: "http://websocket:3001"
        - name: TCP_PORT
          value: "3002"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ingest-api
  namespace: monitoring
spec:
  selector:
    app: ingest-api
  ports:
  - name: http
    port: 80
    targetPort: 3000
  - name: tcp-proxy
    port: 3002
    targetPort: 3002
  type: LoadBalancer
