<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusWatch Pro - v1.0.3</title>

    <!-- ✅ FAVICON do NexusWatch (logo hexagonal azul) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%230ea5e9'/%3E%3Cstop offset='100%25' stop-color='%236366f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='18' fill='%23050508'/%3E%3Cpath d='M50 8 L86 28 L86 72 L50 92 L14 72 L14 28 Z' fill='none' stroke='url(%23g)' stroke-width='3'/%3E%3Cpath d='M50 28 L68 38 L68 62 L50 72 L32 62 L32 38 Z' fill='url(%23g)' opacity='0.9'/%3E%3Ccircle cx='50' cy='50' r='6' fill='white'/%3E%3C/svg%3E" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: 'Rajdhani', sans-serif; 
        background: #050508; 
        color: #e2e8f0; 
        overflow-x: hidden;
      }
      
      /* Futuristic Grid Background */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
          linear-gradient(rgba(18, 16, 33, 0.5) 1px, transparent 1px),
          linear-gradient(90deg, rgba(18, 16, 33, 0.5) 1px, transparent 1px);
        background-size: 30px 30px;
        z-index: -1;
        pointer-events: none;
      }

      /* Scanline Effect */
      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          rgba(18, 16, 33, 0) 50%,
          rgba(0, 0, 0, 0.1) 50%
        ), linear-gradient(
          90deg,
          rgba(255, 0, 0, 0.03),
          rgba(0, 255, 0, 0.01),
          rgba(0, 0, 255, 0.03)
        );
        background-size: 100% 4px, 3px 100%;
        z-index: 1000;
        pointer-events: none;
        opacity: 0.3;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0f;
      }
      ::-webkit-scrollbar-thumb {
        background: #1a1a25;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #38bdf844;
      }

      /* Animations */
      @keyframes pulse-glow {
        0% { box-shadow: 0 0 5px rgba(56, 189, 248, 0.2); }
        50% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        100% { box-shadow: 0 0 5px rgba(56, 189, 248, 0.2); }
      }

      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }

      .scan-line {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: rgba(56, 189, 248, 0.1);
        z-index: 999;
        pointer-events: none;
        animation: scanline 8s linear infinite;
      }
    </style>
  </head>
  <body>
    <div class="scan-line"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
