<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: 'Rajdhani', sans-serif; 
        background: #050508; 
        color: #e2e8f0; 
        overflow: hidden;
      }
      
      /* Futuristic Grid Background */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
          linear-gradient(rgba(18, 16, 33, 0.5) 1px, transparent 1px),
          linear-gradient(90deg, rgba(18, 16, 33, 0.5) 1px, transparent 1px);
        background-size: 30px 30px;
        z-index: -1;
        pointer-events: none;
      }

      /* Scanline Effect */
      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          rgba(18, 16, 33, 0) 50%,
          rgba(0, 0, 0, 0.1) 50%
        ), linear-gradient(
          90deg,
          rgba(255, 0, 0, 0.03),
          rgba(0, 255, 0, 0.01),
          rgba(0, 0, 255, 0.03)
        );
        background-size: 100% 4px, 3px 100%;
        z-index: 1000;
        pointer-events: none;
        opacity: 0.3;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0f;
      }
      ::-webkit-scrollbar-thumb {
        background: #1a1a25;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #38bdf844;
      }

      /* Animations */
      @keyframes pulse-glow {
        0% { box-shadow: 0 0 5px rgba(56, 189, 248, 0.2); }
        50% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        100% { box-shadow: 0 0 5px rgba(56, 189, 248, 0.2); }
      }

      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }

      .scan-line {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: rgba(56, 189, 248, 0.1);
        z-index: 999;
        pointer-events: none;
        animation: scanline 8s linear infinite;
      }
    </style>
  </head>
  <body>
    <div class="scan-line"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
