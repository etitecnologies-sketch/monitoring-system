server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para a API (Usando o nome interno do Railway)
    # Redireciona todas as chamadas de API para o serviço monitoring-system
    location /auth/ { proxy_pass http://monitoring-system:3000/auth/; }
    location /metrics/ { proxy_pass http://monitoring-system:3000/metrics/; }
    location /hosts { proxy_pass http://monitoring-system:3000/hosts; }
    location /alerts { proxy_pass http://monitoring-system:3000/alerts; }
    location /stats { proxy_pass http://monitoring-system:3000/stats; }
    location /clients { proxy_pass http://monitoring-system:3000/clients; }
    location /devices { proxy_pass http://monitoring-system:3000/devices; }
    location /triggers { proxy_pass http://monitoring-system:3000/triggers; }
    location /users { proxy_pass http://monitoring-system:3000/users; }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
