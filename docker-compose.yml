version: "3.9"
services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-monitoring}
      POSTGRES_USER: ${DB_USER:-monitor}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  websocket:
    build: ./websocket-server
    restart: unless-stopped
    environment:
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
  ingest-api:
    build: ./ingest-api
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3002:3002"
    environment:
      DATABASE_URL: postgres://${DB_USER:-monitor}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-monitoring}
      WEBSOCKET_URL: http://websocket:3001
      JWT_SECRET: ${JWT_SECRET:-changeme-secret-jwt}
      PORT: 3000
      TCP_PORT: 3002
    depends_on:
      db:
        condition: service_healthy
      websocket:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
  processor:
    build: ./processor
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${DB_USER:-monitor}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-monitoring}
      EVAL_INTERVAL: ${EVAL_INTERVAL:-3}
      OFFLINE_TIMEOUT: ${OFFLINE_TIMEOUT:-60}
      ALERT_COOLDOWN: ${ALERT_COOLDOWN:-120}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
    depends_on:
      db:
        condition: service_healthy
  agent:
    build: ./agent
    restart: unless-stopped
    environment:
      INGEST_URL: http://ingest-api:3000/metrics
      DEVICE_TOKEN: ${AGENT_DEVICE_TOKEN:-}
    depends_on:
      ingest-api:
        condition: service_healthy
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - ingest-api
      - websocket
  
  vpn-server:
    image: linuxserver/wireguard:latest
    container_name: vpn-server
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - SERVERURL=auto # O sistema detectará o IP público
      - SERVERPORT=51820
      - PEERS=camera-site-1,tecnico-admin
      - PEERDNS=auto
      - INTERNAL_CONTROL_CONFIGS=true
      - ALLOWEDIPS=0.0.0.0/0
    volumes:
      - vpn_config:/config
      - /lib/modules:/lib/modules
    ports:
      - "51820:51820/udp"
    restart: unless-stopped

volumes:
  db_data:
  vpn_config: